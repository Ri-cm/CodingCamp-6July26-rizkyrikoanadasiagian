<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="app-wrapper">

    <!-- ── Balance Display ── -->
    <section id="balance-section" aria-label="Total spending balance">
      <h2>Total Spending</h2>
      <p id="balance-display">$0.00</p>
    </section>

    <!-- ── Input Form ── -->
    <section id="form-section" aria-label="Add a transaction">
      <h2>Add Transaction</h2>
      <form id="transaction-form" novalidate>

        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input
            type="text"
            id="item-name"
            name="item-name"
            maxlength="100"
            placeholder="e.g. Coffee"
            autocomplete="off"
          />
          <span class="error-msg" id="item-name-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input
            type="number"
            id="amount"
            name="amount"
            min="0.01"
            max="999999.99"
            step="0.01"
            placeholder="0.00"
          />
          <span class="error-msg" id="amount-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="">Select category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span class="error-msg" id="category-error" role="alert"></span>
        </div>

        <button type="submit">Add Transaction</button>

      </form>
    </section>

    <!-- ── Transaction List ── -->
    <section id="list-section" aria-label="Transaction history">
      <h2>Transaction History</h2>
      <div id="transaction-list-container">
        <p id="empty-state-msg">No transactions recorded yet.</p>
      </div>
    </section>

    <!-- ── Spending Chart ── -->
    <section id="chart-section" aria-label="Spending by category">
      <h2>Spending by Category</h2>
      <p id="no-data-msg">No spending data to display.</p>
      <div id="chart-canvas-wrapper">
        <canvas id="spending-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
      </div>
    </section>

  </div><!-- /.app-wrapper -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js" defer></script>

</body>
</html>
